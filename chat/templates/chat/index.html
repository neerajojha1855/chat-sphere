{% extends "base.html" %}
{% load static %}

{% block title %}Chat - ChatSphere{% endblock %}

{% block content %}
<div class="flex flex-1 w-full overflow-hidden bg-gray-900" id="app">
    <!-- Sidebar -->
    <div id="sidebar"
        class="w-full md:w-1/3 md:max-w-xs flex flex-col border-r border-gray-800 glass-panel transition-all duration-300">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
            <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                ChatSphere</h1>
            <div class="flex items-center space-x-3">
                {% if user.avatar %}
                <img src="{{ user.avatar.url }}" alt="{{ user.username }}"
                    class="w-8 h-8 rounded-full object-cover border border-gray-600">
                {% else %}
                <span class="text-xs text-gray-300 border px-2 py-1 rounded-full border-gray-700 bg-gray-800">
                    {{ user.username }}
                </span>
                {% endif %}

                <a href="{% url 'users:edit_profile' %}" class="text-gray-400 hover:text-white" title="Edit Profile">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </a>

                <form action="{% url 'users:logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-gray-400 hover:text-white" title="Logout">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                            </path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>

        <div class="p-4 border-b border-gray-800">
            <h3 class="text-xs uppercase tracking-wider text-gray-500 font-semibold mb-3">Chats</h3>
            <div class="relative">
                <input type="text" placeholder="Start new chat with username..."
                    class="w-full bg-gray-800/50 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5"
                    id="newChatInput" autocomplete="off">
                <button id="startChatBtn" class="absolute right-2.5 top-2.5 text-blue-400 hover:text-blue-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto" id="roomList">
            <!-- Room items populated by JS -->
            <div class="flex items-center justify-center h-full text-gray-500 text-sm" id="noRoomsMsg">
                Loading chats...
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="hidden md:flex flex-1 flex-col relative bg-gray-900 transition-all duration-300" id="chatArea">
        <!-- Overlay when no room is selected -->
        <div id="noChatSelectedOverlay"
            class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-gray-900/95 backdrop-blur-sm">
            <svg class="w-16 h-16 text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                </path>
            </svg>
            <h2 class="text-xl font-medium text-gray-400">Select a chat to start messaging</h2>
        </div>

        <!-- Chat Header -->
        <div class="p-4 border-b border-gray-800 flex items-center justify-between glass-panel z-0">
            <div class="flex items-center">
                <button id="backToChatsBtn" class="md:hidden mr-3 text-gray-400 hover:text-white focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg mr-3 shadow-lg"
                    id="activeChatAvatar">?</div>
                <div>
                    <h2 class="font-bold text-white text-lg" id="activeChatName">Loading...</h2>
                </div>
            </div>
        </div>

        <!-- Pinned Messages Area -->
        <div id="pinnedMessagesContainer"
            class="hidden flex-shrink-0 bg-yellow-900/40 border-b border-yellow-700/50 p-2 overflow-x-auto whitespace-nowrap space-x-2 scrollbar-thin scrollbar-thumb-yellow-700/50">
            <!-- Pinned messages injected here -->
        </div>

        <!-- Messages Area -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4" id="messagesList">
            <!-- Messages populated by JS -->
        </div>

        <!-- Message Input -->
        <div class="p-4 border-t border-gray-800 glass-panel z-0">
            <form id="messageForm" class="flex space-x-2">
                <input type="text" id="messageInput"
                    class="flex-1 bg-gray-800/80 border border-gray-700 text-white rounded-full focus:ring-blue-500 focus:border-blue-500 block p-3 px-5 focus:outline-none"
                    placeholder="Type your message..." autocomplete="off">
                <button type="submit"
                    class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg transition-transform transform hover:scale-105">
                    <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        userId: "{{ user.id|default:'' }}",
        username: "{{ user.username|default:'' }}",
        avatarUrl: "{% if user.avatar %}{{ user.avatar.url }}{% endif %}",
        csrfToken: "{{ csrf_token }}",
    };
</script>
<script src="{% static 'js/chat.js' %}?v=4"></script>
{% endblock %}
